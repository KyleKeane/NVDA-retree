[addon]
name = semanticTree
summary = "Semantic Tree"
version = 0.1.0
description = "User-reconfigurable semantic layouts over the NVDA accessibility tree. Lets you assign any navigator object a new position under any other object, override labels, and navigate, search, and inherit structure independently of the underlying automation API."
author = "Kyle Keane <kkeane@mit.edu>"
url = https://github.com/kylekeane/nvda-retree
docFileName = readme.md
minimumNVDAVersion = 2022.1
lastTestedNVDAVersion = 2024.1
